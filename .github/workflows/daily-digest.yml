name: Daily Digest

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "daily_run"
        type: choice
        options:
          - daily_run
          - retry_failed_run
          - publish_only
          - manual_review

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_digest:
    runs-on: ${{ vars.ACTIONS_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Run digest pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PRIVATE_DATA_REPO_PAT: ${{ secrets.PRIVATE_DATA_REPO_PAT }}
          PRIVATE_DATA_REPO: ${{ secrets.PRIVATE_DATA_REPO }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          DISCOVERY_PROVIDER_SAMPLE_FILE: ${{ vars.DISCOVERY_PROVIDER_SAMPLE_FILE }}
          DISCOVERY_PROVIDER_SEARCH_TEMPLATES: ${{ vars.DISCOVERY_PROVIDER_SEARCH_TEMPLATES }}
          DISCOVERY_PROVIDER_REQUEST_HEADERS: ${{ vars.DISCOVERY_PROVIDER_REQUEST_HEADERS }}
        run: |
          MODE="${{ github.event.inputs.mode || 'daily_run' }}"
          npm run "$MODE"

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily site
          git diff --cached --quiet || git commit -m "chore: update daily digest"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy_pages:
    needs: build_digest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
