name: Daily Digest

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "daily_run"
        type: choice
        options:
          - daily_run
          - retry_failed_run
          - publish_only
          - feishu_only
          - manual_review

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: daily-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_digest:
    runs-on: ${{ vars.ACTIONS_RUNNER || 'ubuntu-latest' }}
    outputs:
      should_deploy: ${{ steps.prepare.outputs.should_deploy }}
      mode: ${{ steps.prepare.outputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine run mode
        id: prepare
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            MODE="daily_run"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          if [ "$MODE" = "manual_review" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        if: ${{ steps.prepare.outputs.should_deploy == 'true' }}
        uses: actions/configure-pages@v5

      - name: Run preflight checks
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_TIMEOUT_MS: ${{ vars.DEEPSEEK_TIMEOUT_MS }}
          DEEPSEEK_MAX_RETRIES: ${{ vars.DEEPSEEK_MAX_RETRIES }}
          DEEPSEEK_RETRY_DELAY_MS: ${{ vars.DEEPSEEK_RETRY_DELAY_MS }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PRIVATE_DATA_REPO_PAT: ${{ secrets.PRIVATE_DATA_REPO_PAT }}
          PRIVATE_DATA_REPO: ${{ secrets.PRIVATE_DATA_REPO }}
          PRIVATE_DATA_REPO_BRANCH: ${{ vars.PRIVATE_DATA_REPO_BRANCH }}
          PRIVATE_DATA_REPO_BASE_PATH: ${{ vars.PRIVATE_DATA_REPO_BASE_PATH }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          DISCOVERY_PROVIDER_SAMPLE_FILE: ${{ vars.DISCOVERY_PROVIDER_SAMPLE_FILE }}
          DISCOVERY_PROVIDER_SEARCH_TEMPLATES: ${{ vars.DISCOVERY_PROVIDER_SEARCH_TEMPLATES }}
          DISCOVERY_PROVIDER_REQUEST_HEADERS: ${{ vars.DISCOVERY_PROVIDER_REQUEST_HEADERS }}
          DISCOVERY_PROVIDER_MAX_QUERIES: ${{ vars.DISCOVERY_PROVIDER_MAX_QUERIES }}
        run: npm run preflight_check -- --mode "${{ steps.prepare.outputs.mode }}"

      - name: Run digest pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_TIMEOUT_MS: ${{ vars.DEEPSEEK_TIMEOUT_MS }}
          DEEPSEEK_MAX_RETRIES: ${{ vars.DEEPSEEK_MAX_RETRIES }}
          DEEPSEEK_RETRY_DELAY_MS: ${{ vars.DEEPSEEK_RETRY_DELAY_MS }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PRIVATE_DATA_REPO_PAT: ${{ secrets.PRIVATE_DATA_REPO_PAT }}
          PRIVATE_DATA_REPO: ${{ secrets.PRIVATE_DATA_REPO }}
          PRIVATE_DATA_REPO_BRANCH: ${{ vars.PRIVATE_DATA_REPO_BRANCH }}
          PRIVATE_DATA_REPO_BASE_PATH: ${{ vars.PRIVATE_DATA_REPO_BASE_PATH }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          DISCOVERY_PROVIDER_SAMPLE_FILE: ${{ vars.DISCOVERY_PROVIDER_SAMPLE_FILE }}
          DISCOVERY_PROVIDER_SEARCH_TEMPLATES: ${{ vars.DISCOVERY_PROVIDER_SEARCH_TEMPLATES }}
          DISCOVERY_PROVIDER_REQUEST_HEADERS: ${{ vars.DISCOVERY_PROVIDER_REQUEST_HEADERS }}
          DISCOVERY_PROVIDER_MAX_QUERIES: ${{ vars.DISCOVERY_PROVIDER_MAX_QUERIES }}
        run: |
          MODE="${{ steps.prepare.outputs.mode }}"
          npm run "$MODE"

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            private-data/runs
            private-data/incidents

      - name: Commit generated artifacts
        if: ${{ success() && steps.prepare.outputs.should_deploy == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily site
          git diff --cached --quiet || git commit -m "chore: update daily digest"
          git push

      - name: Upload Pages artifact
        if: ${{ success() && steps.prepare.outputs.should_deploy == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy_pages:
    needs: build_digest
    if: ${{ needs.build_digest.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
